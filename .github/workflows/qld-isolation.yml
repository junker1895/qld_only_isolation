name: QLD isolation

on:
  workflow_dispatch:
  schedule:
    # Runs hourly. GitHub cron schedules use UTC.
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: qld-isolation
  cancel-in-progress: false

jobs:
  qld-isolation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_qld_isolation.txt

      - name: Restore cached graph
        id: graph-cache
        uses: actions/cache@v4
        with:
          path: graph/qld_drive.graphml
          key: qld-drive-graph-v1

      - name: Download graph from GitHub Release
        if: steps.graph-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p graph
          gh release download qld-graph-v1 --pattern "qld_drive_graphml.zip" --dir graph
          unzip -o graph/qld_drive_graphml.zip -d graph
          ls -lh graph

      - name: Run QLD isolation
        run: |
          python qld_isolation_proper_v6.py \
            --graph graph/qld_drive.graphml \
            --places places.csv \
            --manual-connectors manual_graph_connectors.csv \
            --out-dir out_isolation_current

      - name: Show isolation summary
        run: |
          echo "=== qld_isolation_summary.json ==="
          cat out_isolation_current/qld_isolation_summary.json || true
          echo ""
          echo "=== isolated_places_qld.csv ==="
          cat out_isolation_current/isolated_places_qld.csv || true

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -f out_isolation_current/*.csv out_isolation_current/*.json out_isolation_current/*.geojson

          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "Update QLD isolation output"
            git push
          fi
